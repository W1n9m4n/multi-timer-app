<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Cache löschen</title>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#111827; color:#f9fafb; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; padding:24px; }
    .card { max-width:520px; background:#1f2937; border:1px solid rgba(255,255,255,.12); border-radius:24px; padding:24px; box-shadow:0 18px 40px rgba(0,0,0,.35); }
    h1 { margin-top:0; }
    a, button { display:inline-block; margin-top:12px; border:0; border-radius:14px; padding:12px 16px; background:#0284c7; color:white; font-weight:800; text-decoration:none; }
    .muted { color:#9ca3af; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Cache wird gelöscht</h1>
    <p id="status">Service Worker und App-Cache werden entfernt…</p>
    <p class="muted">Version: v8-visible-cachefix</p>
    <a href="./?v=8" id="backLink">Zur App</a>
  </div>
  <script>
    async function clearAppCache() {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(reg => reg.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
        }
        document.getElementById('status').textContent = 'Cache gelöscht. Öffne jetzt die App neu.';
      } catch (e) {
        document.getElementById('status').textContent = 'Cache konnte nicht vollständig gelöscht werden. Öffne die App mit ?v=8 neu.';
      }
    }
    clearAppCache();
  </script>
</body>
</html>
